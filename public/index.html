<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FanBox</title>
  <link rel="stylesheet" href="/style.css" />
  <!-- 内嵌终端（仅桌面 app 启用，浏览器版自动降级）：本地 vendor，离线可用 -->
  <link rel="stylesheet" href="/vendor/xterm/xterm.css" onerror="window.__noXterm=1" />
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="brand">
        <span class="logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" fill-opacity="0.13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.3 7 12 12 20.7 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg></span>
        <div>
          <div class="brand-name">FanBox</div>
          <div class="brand-sub">vibe coding cockpit</div>
        </div>
      </div>

      <button id="cmdk-trigger" class="cmdk-trigger">
        <span class="ct-label"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> 搜索全部文件</span>
        <kbd>⌘K</kbd>
      </button>

      <nav class="nav-section">
        <div class="nav-title">快速入口</div>
        <ul id="roots-list" class="nav-list"></ul>
      </nav>

      <nav class="nav-section">
        <div class="nav-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 收藏</div>
        <ul id="favs-list" class="nav-list"></ul>
      </nav>

      <nav class="nav-section">
        <div class="nav-title" title="最近被 Claude Code / Codex 处理过的项目，自动从两者的本机会话记录扫出来"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> Agent 项目</div>
        <ul id="agent-projects-list" class="nav-list"></ul>
      </nav>

      <div id="skills-entry" class="nav-title side-link" title="本机 Claude Code / Codex 的全部 skills：谁在干活、谁在吃灰、谁在静默失效">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="17.5" y1="14" x2="17.5" y2="21"/><line x1="14" y1="17.5" x2="21" y2="17.5"/></svg>
        Skills 透视
      </div>
      <div id="usage-sec">
        <div class="nav-title" id="usage-toggle" title="Claude Code / Codex 用量——官方限额窗口 + 本机会话日志，不用开着它们">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Agent 用量 <span id="usage-arrow">▸</span>
        </div>
        <div id="usage-body" class="hidden"></div>
      </div>
      <div class="theme-switch" id="theme-switch">
        <div class="theme-switch-label">皮肤</div>
        <div class="theme-seg">
          <button data-skin="warm" title="暖色纸感档案馆">档案</button>
          <button data-skin="terminal" title="终端核 Volt">终端</button>
          <button data-skin="editorial" title="编辑式 · 索引日报">索引</button>
        </div>
      </div>
      <div class="sidebar-foot">本地运行 · 数据不出本机<a id="lang-toggle" class="lang-toggle"></a></div>
      <div id="sidebar-resizer" title="拖动调整侧栏宽度"></div>
    </aside>

    <!-- 主区 -->
    <main id="main">
      <header id="topbar">
        <div class="nav-buttons">
          <button id="btn-sidebar" title="折叠 / 展开侧栏 (⌘B)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg></button>
          <button id="btn-back" title="后退">←</button>
          <button id="btn-up" title="上一级">↑</button>
        </div>
        <nav id="breadcrumb" class="breadcrumb"></nav>
        <div class="topbar-actions">
          <label class="toggle" title="显示隐藏文件">
            <input type="checkbox" id="toggle-hidden" /> 隐藏文件
          </label>
          <div class="seg" id="sort-seg">
            <button data-sort="name" class="active">名称</button>
            <button data-sort="mtime">时间</button>
            <button data-sort="size">大小</button>
          </div>
          <div class="seg" id="view-seg">
            <button data-view="grid" class="active" title="网格">▦</button>
            <button data-view="list" title="列表">☰</button>
          </div>
          <div class="seg" id="gridsize-seg" title="缩略图大小">
            <button data-size="sm" title="小">·</button>
            <button data-size="md" class="active" title="中">▪</button>
            <button data-size="lg" title="大">◼</button>
          </div>
          <button id="btn-changes" class="ghost-btn" title="本会话 agent 改过的文件（点击回看 / diff）"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><span id="changes-badge" class="changes-badge hidden"></span></button>
          <button id="btn-recent" class="ghost-btn" title="此处最近修改的文件"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
          <button id="btn-terminal" class="ghost-btn" title="在当前目录打开系统终端"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> 终端</button>
        </div>
      </header>

      <div id="main-body">
        <div id="filemgmt">
        <div id="content">
          <div id="file-area"></div>
          <div id="statusbar" class="hidden"></div>
        </div>
        <div id="preview-resizer" class="hidden" title="拖动调整大小"></div>
        <section id="preview" class="hidden">
          <header class="preview-head">
            <div class="preview-title" id="preview-title"></div>
            <div class="preview-actions" id="preview-actions"></div>
            <button id="preview-close" title="关闭">✕</button>
          </header>
          <div class="preview-body" id="preview-body"></div>
          <div class="follow-narration hidden" id="follow-narration"></div>
          <div class="preview-foot" id="preview-foot"></div>
        </section>
        </div>
        <div id="terminal-resizer" class="hidden"></div>
        <section id="terminal-panel" class="hidden">
          <header class="term-head">
            <div class="term-tabs" id="term-tabs"></div>
            <div class="term-actions">
              <button id="term-claude" class="agent-launch" title="启动 Claude Code（跳过权限确认）：空闲终端就地启动，正跑着任务则新开标签"><svg width="15" height="15" viewBox="0 0 256 257" preserveAspectRatio="xMidYMid"><path fill="#D97757" d="m50.228 170.321 50.357-28.257.843-2.463-.843-1.361h-2.462l-8.426-.518-28.775-.778-24.952-1.037-24.175-1.296-6.092-1.297L0 125.796l.583-3.759 5.12-3.434 7.324.648 16.202 1.101 24.304 1.685 17.629 1.037 26.118 2.722h4.148l.583-1.685-1.426-1.037-1.101-1.037-25.147-17.045-27.22-18.017-14.258-10.37-7.713-5.25-3.888-4.925-1.685-10.758 7-7.713 9.397.649 2.398.648 9.527 7.323 20.35 15.75L94.817 91.9l3.889 3.24 1.555-1.102.195-.777-1.75-2.917-14.453-26.118-15.425-26.572-6.87-11.018-1.814-6.61c-.648-2.723-1.102-4.991-1.102-7.778l7.972-10.823L71.42 0 82.05 1.426l4.472 3.888 6.61 15.101 10.694 23.786 16.591 32.34 4.861 9.592 2.592 8.879.973 2.722h1.685v-1.556l1.36-18.211 2.528-22.36 2.463-28.776.843-8.1 4.018-9.722 7.971-5.25 6.222 2.981 5.12 7.324-.713 4.73-3.046 19.768-5.962 30.98-3.889 20.739h2.268l2.593-2.593 10.499-13.934 17.628-22.036 7.778-8.749 9.073-9.657 5.833-4.601h11.018l8.1 12.055-3.628 12.443-11.342 14.388-9.398 12.184-13.48 18.147-8.426 14.518.778 1.166 2.01-.194 30.46-6.481 16.462-2.982 19.637-3.37 8.88 4.148.971 4.213-3.5 8.62-20.998 5.184-24.628 4.926-36.682 8.685-.454.324.519.648 16.526 1.555 7.065.389h17.304l32.21 2.398 8.426 5.574 5.055 6.805-.843 5.184-12.962 6.611-17.498-4.148-40.83-9.721-14-3.5h-1.944v1.167l11.666 11.406 21.387 19.314 26.767 24.887 1.36 6.157-3.434 4.86-3.63-.518-23.526-17.693-9.073-7.972-20.545-17.304h-1.36v1.814l4.73 6.935 25.017 37.59 1.296 11.536-1.814 3.76-6.481 2.268-7.13-1.297-14.647-20.544-15.1-23.138-12.185-20.739-1.49.843-7.194 77.448-3.37 3.953-7.778 2.981-6.48-4.925-3.436-7.972 3.435-15.749 4.148-20.544 3.37-16.333 3.046-20.285 1.815-6.74-.13-.454-1.49.194-15.295 20.999-23.267 31.433-18.406 19.702-4.407 1.75-7.648-3.954.713-7.064 4.277-6.286 25.47-32.405 15.36-20.092 9.917-11.6-.065-1.686h-.583L44.07 198.125l-12.055 1.555-5.185-4.86.648-7.972 2.463-2.593 20.35-13.999-.064.065Z"/></svg></button>
              <button id="term-codex" class="agent-launch" title="启动 Codex：空闲终端就地启动，正跑着任务则新开标签"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" fill-rule="evenodd"><path clip-rule="evenodd" d="M8.086.457a6.105 6.105 0 013.046-.415c1.333.153 2.521.72 3.564 1.7a.117.117 0 00.107.029c1.408-.346 2.762-.224 4.061.366l.063.03.154.076c1.357.703 2.33 1.77 2.918 3.198.278.679.418 1.388.421 2.126a5.655 5.655 0 01-.18 1.631.167.167 0 00.04.155 5.982 5.982 0 011.578 2.891c.385 1.901-.01 3.615-1.183 5.14l-.182.22a6.063 6.063 0 01-2.934 1.851.162.162 0 00-.108.102c-.255.736-.511 1.364-.987 1.992-1.199 1.582-2.962 2.462-4.948 2.451-1.583-.008-2.986-.587-4.21-1.736a.145.145 0 00-.14-.032c-.518.167-1.04.191-1.604.185a5.924 5.924 0 01-2.595-.622 6.058 6.058 0 01-2.146-1.781c-.203-.269-.404-.522-.551-.821a7.74 7.74 0 01-.495-1.283 6.11 6.11 0 01-.017-3.064.166.166 0 00.008-.074.115.115 0 00-.037-.064 5.958 5.958 0 01-1.38-2.202 5.196 5.196 0 01-.333-1.589 6.915 6.915 0 01.188-2.132c.45-1.484 1.309-2.648 2.577-3.493.282-.188.55-.334.802-.438.286-.12.573-.22.861-.304a.129.129 0 00.087-.087A6.016 6.016 0 015.635 2.31C6.315 1.464 7.132.846 8.086.457zm-.804 7.85a.848.848 0 00-1.473.842l1.694 2.965-1.688 2.848a.849.849 0 001.46.864l1.94-3.272a.849.849 0 00.007-.854l-1.94-3.393zm5.446 6.24a.849.849 0 000 1.695h4.848a.849.849 0 000-1.696h-4.848z"></path></svg></button>
              <button id="term-opencode" class="agent-launch" title="在终端启动 OpenCode"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></button>
              <button id="term-mimo" class="agent-launch" title="在终端启动 MiMo Code"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></button>
              <button id="file-follow" title="文件跟随：跟着当前终端 tab 的 agent，它改哪个文件，文件区和预览就跟到哪；html/md 边写边出实时预览（手动浏览即自动停）"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>文件跟随</button>
              <button id="term-locate" title="把文件区跳到终端当前所在目录"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>定位文件</button>
              <button id="term-newtab" title="新终端">＋</button>
              <button id="term-max" title="终端铺满"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
              <button id="term-dock" title="切换 上下 / 左右 布局">⇆</button>
              <button id="term-mute" title="提示音开关">🔔</button>
              <button id="term-close" title="收起终端">✕</button>
            </div>
          </header>
          <div id="xterm-host"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- 命令面板 -->
  <div id="cmdk" class="cmdk-overlay hidden">
    <div class="cmdk-panel">
      <div class="cmdk-input-wrap">
        <span class="cmdk-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9aa3b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input id="cmdk-input" placeholder="按文件名搜索…   用 “内容:” 前缀搜文件内容，如 “内容:useState”" autocomplete="off" />
        <button id="scope-toggle" class="scope-toggle on" title="切换搜索范围（Tab）">⤢ 全机</button>
        <kbd>ESC</kbd>
      </div>
      <div id="cmdk-hint" class="cmdk-hint">范围：<b id="cmdk-scope"></b> · Tab 切换范围 · ↑↓ 选择 · ↵ 打开 · ⌘↵ 在编辑器打开</div>
      <ul id="cmdk-results" class="cmdk-results"></ul>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- marked / highlight.js：本地 vendor，离线可用，数据不出本机 -->
  <script src="/vendor/marked/marked.min.js" onerror="window.__noMarked=1"></script>
  <link id="hljs-theme" rel="stylesheet" href="/vendor/hljs/styles/github-dark.min.css" onerror="window.__noHljs=1" />
  <script src="/vendor/hljs/highlight.js" onerror="window.__noHljs=1"></script>
  <script src="/vendor/xterm/xterm.js" onerror="window.__noXterm=1"></script>
  <script src="/vendor/xterm/addon-fit.js" onerror="window.__noXterm=1"></script>
  <script src="/vendor/xterm/addon-webgl.js" onerror="window.__noWebgl=1"></script>
  <script src="/vendor/xterm/addon-unicode11.js" onerror="window.__noUnicode11=1"></script>
  <script src="/i18n-dict.js" onerror="window.__noDict=1"></script>
  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
